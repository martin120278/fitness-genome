name: Build FitnessGenome

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Validate
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_17.2.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_17.1.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_17.0.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          xcodebuild -version

      - name: Build for Simulator
        run: |
          xcodebuild \
            -project "FitnessGenome.xcodeproj" \
            -scheme "FitnessGenome" \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            SWIFT_VERSION=6.0 \
            ENABLE_ON_DEMAND_RESOURCES=NO \
            clean build 2>&1

      - name: Boot simulator and record demo
        run: |
          # Locate the built .app
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData" -name "FitnessGenome.app" \
            -path "*/Debug-iphonesimulator/*" | head -1)
          echo "App: $APP_PATH"

          # Extract bundle ID from compiled Info.plist
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" \
            "$APP_PATH/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"

          # Find best available iPhone simulator (iOS 17 or 18)
          SIM_UDID=$(xcrun simctl list devices available -j | python3 - <<'PYEOF'
import json, sys
data = json.load(sys.stdin)
for runtime in sorted(data["devices"].keys(), reverse=True):
    if "iOS-17" in runtime or "iOS-18" in runtime:
        for dev in data["devices"][runtime]:
            if "iPhone" in dev.get("name", "") and dev.get("isAvailable", False):
                print(dev["udid"])
                exit(0)
PYEOF
)
          echo "Simulator: $SIM_UDID"

          # Boot simulator
          xcrun simctl boot "$SIM_UDID" 2>/dev/null || true
          echo "Waiting for simulator to boot..."
          sleep 20

          # Start recording in background
          xcrun simctl io "$SIM_UDID" recordVideo \
            --codec=h264 "$RUNNER_TEMP/demo.mov" &
          RECORD_PID=$!
          sleep 2

          # Install and launch the app
          xcrun simctl install "$SIM_UDID" "$APP_PATH"
          xcrun simctl launch "$SIM_UDID" "$BUNDLE_ID"
          echo "App launched — recording 40s..."

          # Record for 40 seconds (welcome screen + onboarding start)
          sleep 40

          # Stop recording gracefully
          kill -SIGINT $RECORD_PID
          wait $RECORD_PID 2>/dev/null || true

          echo "VIDEO=$RUNNER_TEMP/demo.mov" >> $GITHUB_ENV

      - name: Upload demo video
        uses: actions/upload-artifact@v4
        with:
          name: FitnessGenome-Demo
          path: ${{ env.VIDEO }}
          retention-days: 14

      - name: Package simulator app (Appetize)
        run: |
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData" -name "FitnessGenome.app" \
            -path "*/Debug-iphonesimulator/*" | head -1)
          cd "$(dirname "$APP_PATH")"
          zip -r "$RUNNER_TEMP/FitnessGenome-Simulator.zip" FitnessGenome.app
          echo "APP_ZIP=$RUNNER_TEMP/FitnessGenome-Simulator.zip" >> $GITHUB_ENV

      - name: Upload simulator build
        uses: actions/upload-artifact@v4
        with:
          name: FitnessGenome-Simulator
          path: ${{ env.APP_ZIP }}
          retention-days: 7
